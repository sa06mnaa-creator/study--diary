{% load static %}
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Study diary | ポートフォリオ</title>
  <link rel="stylesheet" href="/static/css/portfolio.css?v=20260213-2">
</head>

<body>
  <header class="pf-header">
      <div class="pf-header__inner">
        <h1 class="title">Study diary</h1>
        <p class="subtitle">学習記録アプリ（Django）</p>
      </div>
  </header>

  <main class="pf-container">
    <section class="pf-card">
      <h2 class="pf-h2">概要</h2>
      <p class="pf-text">
        Study diaryは、中学生向けの学習アプリです。毎日の目標を設定し、達成できたら自分で作ったスタンプをカレンダーに残せます。
        日々の頑張りを"見える化"し、楽しく振り返ることができます。
      </p>
    </section>

    <section class="pf-card">
      <h2 class="h2">スクリーンショット</h2>

      <nav class="shots">
        <figure class="shot">
          <img src="{% static 'img/home.jpg' %}" alt="ホーム画面">
          <figcaption>ホーム</figcaption>
        </figure>

        <figure class="shot">
          <img src="{% static 'img/calendar.jpg' %}" alt="カレンダー画面">
          <figcaption>カレンダー</figcaption>
        </figure>
      </div>
    </section>

    <section class="pf-card">
      <h2 class="pf-h2">資料</h2>
      <nav class="pf-docs">
        <a href="{% static 'docs/kikaku10.pdf' %}?v=1" target="_blank" rel="noopener">企画書</a>
        <a href="{% static 'docs/screen-design5.pdf' %}?v=1" target="_blank" rel="noopener">画面設計図</a>
        <a href="{% static 'docs/screen-transition.pdf' %}?v=1" target="_blank" rel="noopener">画面遷移図</a>
        <a href="{% static 'docs/er.pdf' %}?v=1" target="_blank" rel="noopener">ER図</a>
      </nav>
    </section>

    <section class="pf-card pf-center">
      <a class="pf-btn" href="{% url 'accounts:home' %}">このアプリにアクセス</a>
    </section>
  </main>

  <footer class="footer">
    <small>© Study diary</small>
  </footer>
</body>
</html>
