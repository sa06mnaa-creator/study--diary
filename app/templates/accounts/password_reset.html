{% extends 'base.html' %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
    <h1 class="page-title">パスワード再設定</h1>
    
    <p class="auth-desc">パスワードの再設定ページのURLを書いたメールを送信します。</p>
    <form method="post" class="auth-form">
    {% csrf_token %}

    <label class="auth-label" for="{{ form.email.id_for_label }}">
        メールアドレス
    </label>

     {{ form.email }}

     {% if form.email.errors %}
    <div class="auth-error">
        {{ form.email.errors }}
    </div>
     {% endif %}

    <button type="submit" class="btn-primary-full">
        メールを送信
    </button>
    
    <a href="{% url 'accounts:login' %}" class="btn-gray">
        ログイン画面に戻る
    </a>
    </form>
    </div>
</div>

{% endblock %}
