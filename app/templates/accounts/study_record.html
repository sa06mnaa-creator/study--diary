{% extends 'base.html' %}
{% block content %}

<div class="record-wrapper">
  <div class="record-inner">
    <h1 class="record-title">記録</h1>

    <p class="form-hint">
        記録したい日付を選んでください。
        達成できたら「達成！」を押してスタンプを記録しましょう。
    </p>

    <!-- 日付はGETで保持してページをリロード -->
    <form method="get" class="record-date">
      <input type="date"
             name="date"
             value="{{ selected_date|date:'Y-m-d' }}"
             onchange="this.form.submit()">
    </form>

    <div class="record-card">
      <span class="subject-label">{{ goal.subject }}</span>
      <ul class="record-list">
        <li>{{ goal.study_hour }}時間{{ goal.study_minute }}分</li>
        {% if goal.page_start %}
          <li>{{ goal.page_start }}ページ～{{ goal.page_end }}ページ</li>
        {% endif %}
      </ul>
    </div>

    <div class="record-actions">
      <!-- ★選択した日付をクエリで stamp_select に渡す -->
      <a href="{% url 'accounts:stamp_select' goal.id %}?date={{ selected_date|date:'Y-m-d' }}"
         class="btn-achieved">達成！</a>

      <form action="{% url 'accounts:not_achieved' %}" method="get">
        <button type="submit" class="btn-not">達成ならず…</button>
      </form>

    </div>

  </div>
</div>

{% endblock %}
