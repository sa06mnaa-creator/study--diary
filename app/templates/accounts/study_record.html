{% extends 'base.html' %}
{% block content %}

<div class="record-wrapper">
  <div class="record-inner">
    <h1 class="record-title">記録</h1>

    <p class="form-hint">
        記録する日付を選び、
        達成したら「達成！」を押してスタンプをつけましょう。
    </p>

    <!-- 日付はGETで保持してページをリロード -->
    <form method="get" class="form-item">
      <input type="date"
             name="date"
             value="{{ selected_date|date:'Y-m-d' }}"
             max="{{ today|date:'Y-m-d' }}"
             onchange="this.form.submit()">
    </form>

    <div class="record-card">
      <span class="subject-label">{{ goal.subject }}</span>
      <ul class="record-list">
        <li>{{ goal.study_hour }}時間{{ goal.study_minute }}分</li>
        {% if goal.page_start %}
          <li>{{ goal.page_start }}ページ～{{ goal.page_end }}ページ</li>
        {% endif %}
      </ul>
    </div>

    <div class="record-actions">
      <!-- ★選択した日付をクエリで stamp_select に渡す -->
      <a href="{% url 'accounts:stamp_select' goal.id %}?date={{ selected_date|date:'Y-m-d' }}"
         class="btn-achieved-clean"
         style="
         display: block;
         width: 100%;
         background: #5b6df6;
         color: white;
         text-decoration: none;
         border: none;
         padding: 14px 0;
         border-radius: 10px;
         text-align: center;
         font-weight: normal;">達成！</a>

      <form action="{% url 'accounts:not_achieved' goal.id %}" method="post">
          {% csrf_token %}
        <button type="submit"
                class="btn-not"
                style="
                width: 100%;
                background: #ddd;
                color: #333;
                border: none;
                padding: 14px 0;
                border-radius: 10px;
                text-align: center;
                font-weight: normal;
                ">達成ならず…</button>
      </form>

    </div>

  </div>
</div>

{% endblock %}
