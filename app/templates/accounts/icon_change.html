{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="icon-change-page">
  <div class="icon-change-container">

    <h2 class="icon-title">アイコンを変更</h2>

    
    <div class="icon-preview">
      <img src="{{ profile.icon.url }}" class="profile-icon">
    </div>

    
    <form method="post" enctype="multipart/form-data" class="icon-change-card">
  {% csrf_token %}


  <label class="icon-btn">
    画像を選択
    <input type="file" name="icon_gallery" accept="image/*">
  </label>

 
  <label class="icon-btn">
    写真を撮る
    <input type="file" name="icon_camera" accept="image/*" capture="environment">
  </label>

  <button type="submit" class="btn-primary-full">更新</button>
  <a href="{% url 'accounts:profile_edit' %}" class="btn-gray-full">キャンセル</a>
</form>
</div>

{% endblock %}
