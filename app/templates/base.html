 {% load static %}
<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="utf-8">
        <title>study diary</title>
        <!--bootstrap-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="{% static 'css/style.css' %}">
        {% block head%}{% endblock %}
        <style>
           .stamp {
                font-size: 22px;
                font-weight: bold;
                
            }
            .month-nav{
                font-size:20px;
                text-decoration:none;
                margin:0 10px;
                color: #007bff;
            }
        </style>
    </head>
    <body>
    <header class="app-header">
        <a href="{% url 'accounts:home' %}" class="app-title">Study diary</a>
        <a href="{% url 'accounts:mypage' %}" class="header-icon-link">
            {% if user.is_authenticated and header_profile and header_profile.icon %}
              <img src="{{ header_profile.icon.url }}" class="header-user-icon">
            {% else %}
            <span class="header-user-emoji">👤</span>
            {% endif %}
        </a>
    </header>
    <main class="content">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="app-footer">
        <a href="{% url 'accounts:home' %}" class="footer-item">
           <img src="{% static 'img/pennant.svg' %}" class="footer-icon">
           <span>目標</span>
        </a>
        <a href="{% url 'accounts:record_top' %}" class="footer-item">
           <img src="{% static 'img/pencil.svg' %}" class="footer-icon">
           <span>記録</span>
        </a>
        <a href="{% url 'accounts:calendar' year=2026 month=1 %}" class="footer-item">
           <img src="{% static 'img/calendar-week.svg' %}" class="footer-icon">
           <span>カレンダー</span>
        </a>
    </footer>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container">
            {% if user.is_authenticated %}
            {% endif %}
             </div>
        </nav> 
            <div class="container mt-3">
          
            </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

        <script>
        function openModal() {
        document.getElementById('logout-modal').classList.remove('hidden');
  }
        function closeModal() {
        document.getElementById('logout-modal').classList.add('hidden');
  }
</script>
</body>
</html>
